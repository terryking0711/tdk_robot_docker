services:
  tdk:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: tdk-ros2-humble:latest
    container_name: tdk_ros2
    network_mode: host
    ipc: host
    privileged: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - LIBGL_ALWAYS_SOFTWARE=${LIBGL_ALWAYS_SOFTWARE:-0}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./workspaces:/workspaces:rw
      - /dev:/dev
      - /run/udev:/run/udev:ro

    devices:
      - /dev/dri:/dev/dri

    stdin_open: true
    tty: true

    command: bash